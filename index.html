<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>SmarterRouter</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        /* Usa i colori di Tailwind (zinc-950 per il dark mode) */
        background: light-dark(#F8F8F7, #09090b);
        color: light-dark(#1f1f1f, #e3e3e3);
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .preflight-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid light-dark(#e5e7eb, #27272a);
        border-top: 4px solid light-dark(#10b981, #10b981); /* emerald-500 */
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 1rem;
      }
      .loading-text {
        font-size: 14px;
        color: light-dark(#52525b, #a1a1aa);
        font-weight: 500;
        letter-spacing: 0.02em;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Questo contenuto verrà sovrascritto da React non appena l'app sarà idratata -->
      <div class="preflight-container">
        <div class="spinner"></div>
        <div class="loading-text">Inizializzazione SmarterRouter...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
